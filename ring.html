<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Badminton Scoreboard | Reset Outside</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .scoreboard {
            width: 100%;
            max-width: 600px;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(12px);
            border-radius: 64px;
            padding: 20px 16px 24px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), inset 0 1px 2px rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
        }

        /* Top bar with reset and settings */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding: 0 8px;
        }
        .reset-outside-btn {
            background: #b13e3e;
            border: none;
            padding: 10px 20px;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,240,0.3);
            transition: 0.1s linear;
        }
        .reset-outside-btn:active {
            transform: scale(0.96);
            background: #8b2e2e;
        }
        .settings-icon {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            width: 44px;
            height: 44px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            cursor: pointer;
            border: 1px solid rgba(255,255,200,0.5);
            transition: 0.1s;
        }
        .settings-icon:active {
            transform: scale(0.92);
            background: rgba(0,0,0,0.8);
        }

        .teams {
            display: flex;
            flex-direction: row;
            gap: 20px;
            margin: 20px 0 20px;
        }

        .team {
            flex: 1;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 48px;
            padding: 32px 12px 28px;
            text-align: center;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(4px);
        }

        .team:active {
            transform: scale(0.97);
            background: rgba(0, 0, 0, 0.85);
            border-color: #ffd966;
        }

        .team-name-input {
            font-size: 1.6rem;
            font-weight: 700;
            text-align: center;
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,200,0.5);
            border-radius: 60px;
            padding: 8px 12px;
            width: 90%;
            margin: 0 auto 16px auto;
            color: #f8f9fa;
            font-weight: 600;
            backdrop-filter: blur(4px);
        }

        .score {
            font-size: 5.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFF 30%, #ffecb3 80%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 2px 8px rgba(0,0,0,0.2);
            line-height: 1.1;
            margin-bottom: 12px;
        }

        .game-point {
            font-size: 0.9rem;
            background: #ff9800;
            display: inline-block;
            padding: 5px 12px;
            border-radius: 60px;
            font-weight: 600;
            color: #1e2a1c;
        }

        .status-bar {
            margin-top: 16px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 100px;
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            backdrop-filter: blur(8px);
            color: #cfd8cf;
        }
        .status-led {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 10px;
            background-color: #aaa;
            margin-right: 6px;
        }
        .ring-status {
            font-size: 0.7rem;
        }

        /* MODAL */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s ease;
        }
        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }
        .modal-container {
            background: rgba(20,30,18,0.95);
            backdrop-filter: blur(20px);
            width: 85%;
            max-width: 380px;
            border-radius: 48px;
            padding: 24px 20px;
            border: 1px solid #ffd966;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,200,0.3);
            padding-bottom: 10px;
        }
        .modal-header h3 {
            color: #ffecb3;
            font-size: 1.4rem;
        }
        .close-modal {
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            padding: 0 8px;
        }
        .settings-group {
            margin-bottom: 20px;
        }
        .settings-label {
            color: #ffecb3;
            font-weight: 600;
            margin-bottom: 6px;
            display: block;
            font-size: 0.9rem;
        }
        select, button.modal-btn {
            width: 100%;
            padding: 10px 14px;
            background: #1e2a1a;
            border: 1px solid #ffd966;
            border-radius: 60px;
            color: white;
            font-size: 0.9rem;
            margin-top: 6px;
            cursor: pointer;
        }
        .speed-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .speed-row input {
            flex: 2;
        }
        .speed-value {
            background: #1e2a1a;
            padding: 6px 12px;
            border-radius: 60px;
            min-width: 60px;
            text-align: center;
            color: #ffecb3;
        }
        .double-btn {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }
        .double-btn button {
            flex: 1;
            background: #2c5f8a;
        }
        button.reload-voice {
            background: #4a6fa5;
            margin-top: 6px;
        }
        @media (max-width: 480px) {
            .score {
                font-size: 3.8rem;
            }
            .team-name-input {
                font-size: 1.2rem;
            }
            .modal-container {
                width: 90%;
            }
            .reset-outside-btn {
                padding: 6px 12px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
<div class="scoreboard" id="scoreboardContainer">
    <!-- top bar with Reset button (outside) and Settings gear -->
    <div class="top-bar">
        <button id="resetOutsideBtn" class="reset-outside-btn">⟳ RESET MATCH</button>
        <div class="settings-icon" id="openSettingsBtn">⚙️</div>
    </div>

    <div class="teams">
        <div class="team" id="teamAPanel">
            <input type="text" id="teamAName" class="team-name-input" value="MY TEAM" maxlength="20">
            <div class="score" id="teamAScore">0</div>
            <div id="teamAGamePoint" class="game-point" style="display: none;">⚡ GAME POINT</div>
        </div>
        <div class="team" id="teamBPanel">
            <input type="text" id="teamBName" class="team-name-input" value="OPPONENT" maxlength="20">
            <div class="score" id="teamBScore">0</div>
            <div id="teamBGamePoint" class="game-point" style="display: none;">⚠️ GAME POINT</div>
        </div>
    </div>

    <div class="status-bar">
        <div class="audio-status">
            <span class="status-led" id="audioLed"></span>
            <span id="audioStatusText">Ready</span>
        </div>
        <div class="ring-status">💍 1 click = left | 2 = right</div>
    </div>
</div>

<!-- MODAL for settings (no reset button inside) -->
<div id="settingsModal" class="modal-overlay">
    <div class="modal-container">
        <div class="modal-header">
            <h3>⚙️ Settings</h3>
            <button class="close-modal" id="closeModalBtn">✕</button>
        </div>
        <div class="settings-group">
            <span class="settings-label">🗣️ Language</span>
            <select id="languageSelect">
                <option value="en">English</option>
                <option value="ar">Arabic (عربي)</option>
                <option value="ml">Malayalam (മലയാളം)</option>
            </select>
        </div>
        <div class="settings-group">
            <span class="settings-label">🎤 Voice (for selected language)</span>
            <select id="voiceSelect">
                <option value="">Loading voices...</option>
            </select>
            <button id="reloadVoicesBtn" class="reload-voice">⟳ Reload Voices</button>
        </div>
        <div class="settings-group">
            <span class="settings-label">🐢 Voice Speed</span>
            <div class="speed-row">
                <input type="range" id="voiceSpeedSlider" min="0.5" max="1.8" step="0.05" value="0.95">
                <div class="speed-value" id="speedValueDisplay">0.95x</div>
            </div>
        </div>
        <div class="double-btn">
            <button id="testVoiceModalBtn">🔊 Test Voice</button>
        </div>
    </div>
</div>

<script>
    // ---------- SCORING ----------
    let teamAScore = 0, teamBScore = 0;
    const WINNING_SCORE = 21;
    let gameFinished = false;
    let currentVoiceRate = 0.95;
    let selectedVoiceURI = null;
    let currentLanguage = 'en';
    let isModalOpen = false;

    // DOM elements main
    const teamAScoreEl = document.getElementById('teamAScore');
    const teamBScoreEl = document.getElementById('teamBScore');
    const teamAGamePointEl = document.getElementById('teamAGamePoint');
    const teamBGamePointEl = document.getElementById('teamBGamePoint');
    const teamAPanel = document.getElementById('teamAPanel');
    const teamBPanel = document.getElementById('teamBPanel');
    const teamANameInput = document.getElementById('teamAName');
    const teamBNameInput = document.getElementById('teamBName');
    const audioLed = document.getElementById('audioLed');
    const audioStatusTextSpan = document.getElementById('audioStatusText');
    const resetOutsideBtn = document.getElementById('resetOutsideBtn');

    // Modal elements
    const modal = document.getElementById('settingsModal');
    const openBtn = document.getElementById('openSettingsBtn');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const languageSelect = document.getElementById('languageSelect');
    const voiceSelect = document.getElementById('voiceSelect');
    const reloadVoicesBtn = document.getElementById('reloadVoicesBtn');
    const voiceSpeedSlider = document.getElementById('voiceSpeedSlider');
    const speedValueDisplay = document.getElementById('speedValueDisplay');
    const testVoiceModalBtn = document.getElementById('testVoiceModalBtn');

    let audioPermissionGranted = false;
    let speechSupported = 'speechSynthesis' in window;
    let voicesList = [];

    // Helper: filter by language
    function filterVoicesByLanguage(lang) {
        if (lang === 'en') return voicesList.filter(v => v.lang.startsWith('en'));
        if (lang === 'ar') return voicesList.filter(v => v.lang.startsWith('ar'));
        if (lang === 'ml') return voicesList.filter(v => v.lang === 'ml' || v.lang === 'ml-IN');
        return [];
    }

    function populateVoiceList() {
        if (!speechSupported) return;
        voicesList = window.speechSynthesis.getVoices();
        const filtered = filterVoicesByLanguage(currentLanguage);
        voiceSelect.innerHTML = '';
        if (filtered.length === 0) {
            voiceSelect.innerHTML = '<option value="">No voices for this language</option>';
            voiceSelect.disabled = true;
            return;
        }
        voiceSelect.disabled = false;
        filtered.forEach(voice => {
            const option = document.createElement('option');
            const voiceId = `${voice.name}|${voice.lang}|${voice.voiceURI}`;
            option.value = voiceId;
            option.textContent = `${voice.name} (${voice.lang})`;
            voiceSelect.appendChild(option);
        });
        if (selectedVoiceURI) {
            for (let i = 0; i < voiceSelect.options.length; i++) {
                if (voiceSelect.options[i].value.split('|')[2] === selectedVoiceURI) {
                    voiceSelect.selectedIndex = i;
                    break;
                }
            }
        }
    }

    function getSelectedVoiceObject() {
        const val = voiceSelect.value;
        if (!val || voiceSelect.disabled) return null;
        const parts = val.split('|');
        if (parts.length < 3) return null;
        const filtered = filterVoicesByLanguage(currentLanguage);
        return filtered.find(v => v.name === parts[0] && v.lang === parts[1] && v.voiceURI === parts[2]) || null;
    }

    function speakMessage(message, rate = currentVoiceRate, forceNoCancel = false) {
        if (!speechSupported || !audioPermissionGranted) return;
        if (!forceNoCancel) window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(message);
        utterance.rate = rate;
        utterance.pitch = 1.1;
        utterance.volume = 1;
        const voice = getSelectedVoiceObject();
        if (voice) utterance.voice = voice;
        window.speechSynthesis.speak(utterance);
    }

    function announceScore(scoringTeam, scoreA, scoreB, isGamePoint = false, isWin = false, winner = null) {
        if (!audioPermissionGranted) return;
        let msg = "";
        if (isWin && winner) {
            const winnerName = winner === 'A' ? teamANameInput.value : teamBNameInput.value;
            if (currentLanguage === 'ar') {
                msg = `انتهت المباراة! فاز ${winnerName}. النتيجة ${winner === 'A' ? `${scoreA} ${scoreB}` : `${scoreB} ${scoreA}`}`;
            } else {
                msg = `Game set! ${winnerName} wins. ${winner === 'A' ? `${scoreA} ${scoreB}` : `${scoreB} ${scoreA}`}`;
            }
        } else if (isGamePoint) {
            const scores = scoringTeam === 'A' ? `${scoreA} ${scoreB}` : `${scoreB} ${scoreA}`;
            msg = currentLanguage === 'ar' ? `نقطة فوز. ${scores}` : `Game point. ${scores}`;
        } else {
            msg = scoringTeam === 'A' ? `${scoreA} ${scoreB}` : `${scoreB} ${scoreA}`;
        }
        speakMessage(msg);
    }

    function enableAudio() {
        if (audioPermissionGranted) return;
        const dummy = new SpeechSynthesisUtterance(" ");
        dummy.volume = 0;
        window.speechSynthesis.speak(dummy);
        audioPermissionGranted = true;
        audioLed.style.backgroundColor = "#4caf50";
        audioStatusTextSpan.innerText = "Voice ready";
    }

    function updateUIAndAnnounce(scoringTeam) {
        teamAScoreEl.innerText = teamAScore;
        teamBScoreEl.innerText = teamBScore;
        teamAGamePointEl.style.display = (teamAScore === WINNING_SCORE-1 && teamBScore < WINNING_SCORE-1) ? "inline-block" : "none";
        teamBGamePointEl.style.display = (teamBScore === WINNING_SCORE-1 && teamAScore < WINNING_SCORE-1) ? "inline-block" : "none";
        let isGamePointSituation = (teamAScore === WINNING_SCORE-1 || teamBScore === WINNING_SCORE-1) && !gameFinished;
        let winner = null;
        if (teamAScore >= WINNING_SCORE && teamAScore - teamBScore >= 2) winner = 'A';
        else if (teamBScore >= WINNING_SCORE && teamBScore - teamAScore >= 2) winner = 'B';
        if (winner) {
            gameFinished = true;
            announceScore(winner, teamAScore, teamBScore, false, true, winner);
        } else {
            announceScore(scoringTeam, teamAScore, teamBScore, isGamePointSituation, false);
        }
    }

    function addPointToTeam(team) {
        if (isModalOpen) return;
        if (gameFinished) {
            speakMessage(`Match finished, reset to continue`, currentVoiceRate);
            return;
        }
        if (!audioPermissionGranted) enableAudio();
        if (team === 'A') {
            if (teamAScore >= WINNING_SCORE && teamAScore - teamBScore >= 2) return;
            teamAScore++;
        } else {
            if (teamBScore >= WINNING_SCORE && teamBScore - teamAScore >= 2) return;
            teamBScore++;
        }
        updateUIAndAnnounce(team);
    }

    function resetMatch() {
        teamAScore = 0;
        teamBScore = 0;
        gameFinished = false;
        teamAScoreEl.innerText = "0";
        teamBScoreEl.innerText = "0";
        teamAGamePointEl.style.display = "none";
        teamBGamePointEl.style.display = "none";
        if (audioPermissionGranted) speakMessage("Match reset, zero zero", currentVoiceRate);
    }

    // ---------- POINT ADDING ONLY ON TEAM PANELS ----------
    function flashPanel(panel) {
        panel.classList.add('touch-active');
        setTimeout(() => panel.classList.remove('touch-active'), 120);
    }

    teamAPanel.addEventListener('click', (e) => {
        if (teamANameInput === e.target) return;
        if (isModalOpen) return;
        e.stopPropagation();
        addPointToTeam('A');
        flashPanel(teamAPanel);
    });

    teamBPanel.addEventListener('click', (e) => {
        if (teamBNameInput === e.target) return;
        if (isModalOpen) return;
        e.stopPropagation();
        addPointToTeam('B');
        flashPanel(teamBPanel);
    });

    // Reset button outside
    resetOutsideBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        resetMatch();
    });

    // Gear icon: open modal
    openBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        openModal();
    });

    // --- Ring control (works only when modal is closed) ---
    let ringTimer = null, pendingSingle = false;
    function onRingPress() {
        if (isModalOpen) return;
        if (!audioPermissionGranted) enableAudio();
        if (ringTimer) clearTimeout(ringTimer);
        if (pendingSingle) {
            pendingSingle = false;
            ringTimer = null;
            addPointToTeam('B');
            flashPanel(teamBPanel);
        } else {
            pendingSingle = true;
            ringTimer = setTimeout(() => {
                if (pendingSingle) {
                    pendingSingle = false;
                    addPointToTeam('A');
                    flashPanel(teamAPanel);
                }
                ringTimer = null;
            }, 250);
        }
    }
    document.addEventListener('keydown', (e) => {
        if (isModalOpen) return;
        if (e.key === ' ' || e.key === 'Space' || e.key === 'Enter') {
            e.preventDefault();
            onRingPress();
        } else if (e.key === 'ArrowLeft') {
            e.preventDefault();
            addPointToTeam('A');
            flashPanel(teamAPanel);
        } else if (e.key === 'ArrowRight') {
            e.preventDefault();
            addPointToTeam('B');
            flashPanel(teamBPanel);
        }
    });
    const container = document.getElementById('scoreboardContainer');
    document.addEventListener('click', (e) => {
        if (isModalOpen) return;
        if (!container.contains(e.target)) onRingPress();
    });

    // --- MODAL logic ---
    function openModal() {
        isModalOpen = true;
        modal.classList.add('active');
    }
    function closeModal() {
        isModalOpen = false;
        modal.classList.remove('active');
    }
    closeModalBtn.addEventListener('click', () => closeModal());
    modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

    function updateSpeed() {
        currentVoiceRate = parseFloat(voiceSpeedSlider.value);
        speedValueDisplay.innerText = currentVoiceRate.toFixed(2) + "x";
        if (audioPermissionGranted && !isModalOpen) speakMessage(`Speed ${currentVoiceRate.toFixed(2)}`, currentVoiceRate);
    }
    voiceSpeedSlider.addEventListener('input', updateSpeed);

    languageSelect.addEventListener('change', () => {
        currentLanguage = languageSelect.value;
        populateVoiceList();
        if (audioPermissionGranted && !isModalOpen) speakMessage(currentLanguage === 'ar' ? 'اختبار الصوت' : currentLanguage === 'ml' ? 'Voice changed' : 'Voice changed', currentVoiceRate);
    });

    voiceSelect.addEventListener('change', () => {
        const voice = getSelectedVoiceObject();
        if (voice) selectedVoiceURI = voice.voiceURI;
        if (audioPermissionGranted && voice && !isModalOpen) {
            speakMessage(`Voice set to ${voice.name}`, currentVoiceRate);
        }
    });

    reloadVoicesBtn.addEventListener('click', () => {
        window.speechSynthesis.cancel();
        const dummy = new SpeechSynthesisUtterance('');
        dummy.volume = 0;
        window.speechSynthesis.speak(dummy);
        setTimeout(() => populateVoiceList(), 100);
    });

    testVoiceModalBtn.addEventListener('click', () => {
        enableAudio();
        speakMessage(currentLanguage === 'ar' ? 'اختبار الصوت' : currentLanguage === 'ml' ? 'Voice test' : 'Voice test', currentVoiceRate);
    });

    // Initialise voices
    if (speechSupported) {
        window.speechSynthesis.addEventListener('voiceschanged', () => populateVoiceList());
        setTimeout(() => populateVoiceList(), 300);
    }
    function firstTouch() { enableAudio(); document.removeEventListener('touchstart', firstTouch); }
    document.addEventListener('touchstart', firstTouch);
    resetMatch();
</script>
</body>
</html>
